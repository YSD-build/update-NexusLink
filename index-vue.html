<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="NexusLink 内网穿透平台 - 快速、稳定、安全的内网穿透服务">
  <meta name="theme-color" content="#3b82f6">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>NexusLink - 内网穿透平台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      background-attachment: fixed;
    }
    #app { height: 100%; }
    .loading-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    .loading-logo {
      font-size: 32px;
      font-weight: 700;
      color: white;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      margin-top: 16px;
      color: rgba(255,255,255,0.8);
      font-size: 14px;
    }
  </style>
  <script type="module" crossorigin src="/assets/js/index-CwawOuaA.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/js/vue-vendor-CLbJKOpg.js">
  <link rel="modulepreload" crossorigin href="/assets/js/axios-DhXgJQ-f.js">
  <link rel="stylesheet" crossorigin href="/assets/css/index-BEyutqUS.css">
</head>
<body>
  <div id="app">
    <div class="loading-screen" id="loading">
      <div class="loading-logo">NexusLink</div>
      <div class="loading-spinner"></div>
      <div class="loading-text">加载中...</div>
    </div>
  </div>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loading = document.getElementById('loading')
        if (loading) {
          loading.style.opacity = '0'
          setTimeout(() => loading.remove(), 300)
        }
      }, 200)
    })
  </script>
</body>
</html>
